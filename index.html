<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="中转站倍率计算器：把任意基准汇率和折扣换算到 ¥1:$1 基准，得出实际支付倍率"
    />
    <title>中转站倍率计算器</title>
    <link rel="stylesheet" href="styles.css?v=14" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-row">
          <div class="hero-copy">
            <p class="eyebrow">Relay Rate Calculator</p>
            <h1>中转站倍率计算器</h1>
          </div>
          <nav class="hero-links" aria-label="项目链接">
            <a
              class="github-btn"
              href="https://github.com/ZephyrDeng/relay-rate-calc"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg class="icon-github" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.178 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.021C22 6.484 17.522 2 12 2Z"
                />
              </svg>
              <span>GitHub</span>
            </a>
            <a
              class="github-star-btn"
              href="https://github.com/ZephyrDeng/relay-rate-calc"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="在 GitHub 上 Star 本项目"
            >
              <svg class="icon-star" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
              <span id="github-star-count" class="github-star-count">—</span>
              <span class="github-star-label">Star</span>
            </a>
            <span class="traffic-stat" aria-label="站点访问统计">
              <svg class="icon-traffic" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                />
              </svg>
              <span class="traffic-values">
                <span id="busuanzi_value_site_uv" class="traffic-count">—</span>
                <span class="traffic-label">访客</span>
                <span class="traffic-sep" aria-hidden="true">·</span>
                <span id="busuanzi_value_site_pv" class="traffic-count">—</span>
                <span class="traffic-label">PV</span>
              </span>
            </span>
          </nav>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar">
          <section class="card input-card" aria-label="输入参数">
        <div class="field market-field">
          <div class="market-header">
            <div class="field-label-row">
              <span class="label">市场汇率</span>
              <button type="button" class="tip-trigger" aria-label="市场汇率说明">
                <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                  <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                  <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
                <span id="market-rate-tip" class="tip-popover" role="tooltip">实时 USD/CNY 汇率，可一键填入基准汇率。</span>
              </button>
            </div>
            <button type="button" id="refresh-market-rate" class="text-btn">
              刷新
            </button>
          </div>
          <div class="market-rate-card">
            <p class="market-rate-value">
              ¥ <span id="market-rate-value">—</span> : $1
            </p>
            <p id="market-rate-meta" class="hint market-rate-meta">获取中…</p>
            <button type="button" id="apply-market-rate" class="apply-btn" disabled>
              填入基准汇率
            </button>
          </div>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label for="base-rate" class="label">基准汇率</label>
            <button type="button" class="tip-trigger" aria-label="基准汇率说明">
              <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
              </svg>
              <span class="tip-popover" role="tooltip">买 1 美元在折扣前的标价（人民币）。</span>
            </button>
          </div>
          <div class="rate-input">
            <span class="prefix">¥</span>
            <input
              id="base-rate"
              type="number"
              inputmode="decimal"
              min="0"
              step="any"
              value="1"
            />
            <span class="suffix">: $1</span>
          </div>
        </div>

        <div class="field">
          <span class="label">折扣输入</span>
          <div class="mode-switch" role="tablist" aria-label="折扣输入方式">
            <button
              type="button"
              class="mode-btn active"
              data-mode="zhe"
              role="tab"
              aria-selected="true"
              aria-controls="discount-panel"
            >
              折
            </button>
            <button
              type="button"
              class="mode-btn"
              data-mode="multiplier"
              role="tab"
              aria-selected="false"
              aria-controls="discount-panel"
            >
              倍率
            </button>
          </div>
        </div>

        <div id="discount-panel" class="field" role="tabpanel">
          <div class="field-label-row">
            <label for="discount-value" id="discount-label" class="label">折扣（折）</label>
            <span id="multiplier-preview" class="label-meta">×0.5</span>
            <button type="button" class="tip-trigger" aria-label="折扣说明">
              <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
              </svg>
              <span id="discount-tip" class="tip-popover" role="tooltip">5 折 = 支付原价的 50%。</span>
            </button>
          </div>
          <div class="discount-input">
            <input
              id="discount-value"
              type="number"
              inputmode="decimal"
              min="0"
              step="any"
              value="5"
            />
            <span id="discount-suffix" class="suffix">折</span>
          </div>
        </div>

        <div class="field vision-field">
          <div class="vision-header">
            <span class="label">截图识图</span>
            <button type="button" class="vision-badge tip-trigger" aria-label="识图服务说明">
              Agnes 免费
              <span class="tip-popover tip-popover-wide" role="tooltip">
                由 Agnes AI 免费识图，支持多图合并（充值页 + 预览页）。粘贴快捷键：<kbd>⌘V</kbd> / <kbd>Ctrl+V</kbd>。
                <a href="https://agnes-ai.com/doc/agnes-20-flash" target="_blank" rel="noopener noreferrer">文档</a>
              </span>
            </button>
          </div>
          <div id="vision-gallery" class="vision-gallery hidden" aria-live="polite"></div>
          <div
            id="vision-dropzone"
            class="vision-dropzone"
            role="button"
            tabindex="0"
            aria-label="上传或粘贴中转站截图"
          >
            <p id="vision-file-name" class="vision-file-name">点击、拖拽或粘贴截图</p>
          </div>
          <input id="vision-file" type="file" accept="image/*" multiple hidden />
          <div class="vision-actions">
            <button type="button" id="vision-analyze" class="apply-btn" disabled>
              识别并填参
            </button>
            <button type="button" id="vision-clear" class="text-btn">清除</button>
          </div>
          <p id="vision-status" class="hint vision-status"></p>
        </div>

        <div class="presets">
          <span class="label">示例</span>
          <div class="preset-buttons">
            <button type="button" class="preset-btn" data-preset="channel1">
              ¥1:$1 · 5折
            </button>
            <button type="button" class="preset-btn" data-preset="channel2">
              ¥7:$1 · 1.5折
            </button>
          </div>
        </div>
          </section>
        </aside>

        <div class="main-panel">
          <section
            class="card output-card"
            aria-labelledby="output-heading"
            aria-live="polite"
          >
        <h2 id="output-heading">计算结果</h2>

        <p id="error-message" class="error hidden" role="alert"></p>

        <div id="results" class="results">
          <article class="result-item highlight">
            <div class="field-label-row result-label-row">
              <p class="result-label">归一化倍率</p>
              <button type="button" class="tip-trigger" aria-label="归一化倍率说明">
                <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                  <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                  <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
                <span id="equivalent-tip" class="tip-popover" role="tooltip">按 ¥1:$1 基准换算；相当于 5 折。</span>
              </button>
            </div>
            <p class="result-value">
              <span aria-hidden="true">×</span>
              <span id="normalized-multiplier">0.5</span>
            </p>
          </article>

          <article class="result-item">
            <p class="result-label">买 1 美元实付</p>
            <p class="result-value">
              <span id="cny-per-usd">0.5</span>
              <span class="unit">元</span>
            </p>
          </article>

          <article class="result-item">
            <p class="result-label">1 元可换</p>
            <p class="result-value">
              <span id="usd-per-cny">2</span>
              <span class="unit">美元</span>
            </p>
          </article>

          <article id="market-compare" class="result-item market-compare hidden">
            <div class="field-label-row result-label-row">
              <p class="result-label">相对市场汇率</p>
              <button type="button" class="tip-trigger" aria-label="市场对比说明">
                <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                  <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                  <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
                <span id="market-compare-tip" class="tip-popover" role="tooltip">—</span>
              </button>
            </div>
            <p class="result-value">
              <span id="market-advantage">—</span>
              <span class="unit">倍</span>
            </p>
          </article>
        </div>
          </section>

          <section class="card cost-card" aria-labelledby="cost-heading">
            <div class="cost-header">
              <div class="field-label-row heading-label-row">
                <h2 id="cost-heading">参考成本</h2>
                <button type="button" class="tip-trigger" aria-label="参考成本说明">
                  <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
                    <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
                    <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
                    <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                  </svg>
                  <span id="pricing-tip" class="tip-popover tip-popover-wide" role="tooltip">
                    基于 OpenAI / Anthropic 官方 API 标价估算。官方按美元计费，中转按人民币实付；请用「官方等价」对比，勿直接比 $ 与 ¥ 数值。
                  </span>
                </button>
              </div>
            </div>
            <div id="cost-scenarios" class="cost-list"></div>
          </section>
        </div>
      </div>

      <footer class="footer">
        <button type="button" class="footer-tip tip-trigger" aria-label="计算公式说明">
          公式说明
          <svg class="tip-icon" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.4" />
            <circle cx="8" cy="5.4" r="0.9" fill="currentColor" />
            <path d="M8 7.6v3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          <span class="tip-popover tip-popover-wide" role="tooltip">
            归一化倍率 = 基准汇率 × 支付倍率；1 元可换美元 = 1 ÷ 归一化倍率。官方等价（元）= 官方美元 × 市场汇率；中转实付（元）= 官方美元 × 归一化倍率。
          </span>
        </button>
      </footer>
    </main>

    <script src="pricing.js"></script>
    <script src="agnes-config.js"></script>
    <script src="vision.js"></script>
    <script src="app.js"></script>
    <script
      async
      src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"
    ></script>
  </body>
</html>
